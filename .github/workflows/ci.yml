name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore CreativeHub.sln

      - name: Build
        run: dotnet build CreativeHub.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test CreativeHub.sln --configuration Release --no-build --verbosity normal
